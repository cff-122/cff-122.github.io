<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:#f6f5f3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px 48px;-webkit-tap-highlight-color:transparent}
.card{background:#fff;width:100%;max-width:420px;border-radius:20px;padding:28px 20px 32px;box-shadow:0 8px 30px rgba(0,0,0,.08);text-align:center}
h2{font-size:20px;color:#222;margin-bottom:6px}
.sub{font-size:13px;color:#888;margin-bottom:18px}
.qr-wrap{margin:0 auto 18px;width:min(260px,70vw);aspect-ratio:1/1;border-radius:16px;overflow:hidden;background:#fafafa;border:1px solid #eee;display:flex;align-items:center;justify-content:center}
.qr-wrap img{width:100%;height:100%;object-fit:contain}
.tip{font-size:13px;color:#666;line-height:1.6;margin-bottom:16px}
.wx-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.wx-id{background:#f3f3f3;border-radius:10px;padding:8px 14px;font-size:15px;color:#222;letter-spacing:.4px;user-select:all}
.copy-btn{appearance:none;border:none;cursor:pointer;background:#07c160;color:#fff;font-size:14px;padding:8px 14px;border-radius:10px;font-weight:600}
.copy-btn:active{opacity:.85}
.save-tip{font-size:12px;color:#aaa}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.72);color:#fff;padding:8px 18px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s}
#toast.show{opacity:1}
</style>

  <div class="save-tip">如二维码不识别，可截图保存后到微信相册选择扫码</div>
</div>

<div id="toast"></div>

<script>
function copyWx(){
  var t=document.getElementById('wxid').innerText.trim();
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(show).catch(fallback);
  }else fallback();
  function fallback(){var a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;left:-9999px';document.body.appendChild(a);a.select();try{document.execCommand('copy');show()}catch(e){}document.body.removeChild(a)}
  function show(){var o=document.getElementById('toast');o.textContent='✅ 已复制：'+t;o.classList.add('show');setTimeout(function(){o.classList.remove('show')},1500)}
}
</script>
</body>
</html>
